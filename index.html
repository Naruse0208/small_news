<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>small news v1.2</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
<style>
:root {
  --bg-color: #ffffff;
  --text-color: #333333;
  --header-bg: rgba(255, 255, 255, 0.95);
  --tab-color: #888;
  --tab-active: #000;
  --card-bg: #f5f5f5;
  --card-active: #e0e0e0;
  --border-color: #0a84ff;
  --date-color: #666;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-color: #121212;
    --text-color: #e0e0e0;
    --header-bg: rgba(30, 30, 30, 0.95);
    --tab-color: #888;
    --tab-active: #fff;
    --card-bg: #1e1e1e;
    --card-active: #333;
    --date-color: #888;
  }
}
body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; overscroll-behavior-y: none; }
header { padding: 10px 0; background: var(--header-bg); position: sticky; top: 0; z-index: 10; display: flex; justify-content: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
nav { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; width: 100vw; box-sizing: border-box; }
nav::-webkit-scrollbar { display: none; }
.tab { color: var(--tab-color); text-decoration: none; font-size: 15px; font-weight: bold; padding: 5px 10px; cursor: pointer; transition: color 0.3s; user-select: none; white-space: nowrap; }
.tab.active { color: var(--tab-active); border-bottom: 2px solid var(--border-color); }
.container { width: 100vw; height: calc(100vh - 50px); overflow-y: auto; padding: 10px 15px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
.container::-webkit-scrollbar { display: none; }
.article { display: block; padding: 15px; margin-bottom: 12px; background: var(--card-bg); border-radius: 8px; text-decoration: none; color: inherit; transition: background 0.2s, transform 0.1s; cursor: pointer; }
.article:active { background: var(--card-active); transform: scale(0.98); }
.article.read .title { color: var(--tab-color); font-weight: 400; }
.title { font-size: 16px; line-height: 1.4; font-weight: 500; margin-bottom: 8px; transition: color 0.2s; }
.meta { display: flex; justify-content: space-between; align-items: center; }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #fff; }
.tag-top { background: #ff3b30; }
.tag-eco { background: #4cd964; }
.tag-it  { background: #0a84ff; }
.tag-int { background: #ff9500; }
.tag-dom { background: #e74c3c; }
.tag-ent { background: #9b59b6; }
.tag-spo { background: #3498db; }
.tag-sci { background: #2ecc71; }
.tag-loc { background: #f1c40f; color: #000; }
.tag-tgt { background: #000000; color: #ffffff; }
.tag-ggz { background: #d32f2f; color: #ffffff; }
.pv { font-size: 11px; color: var(--date-color); margin-right: 8px; }
.date { font-size: 12px; color: var(--date-color); }

/* Touch/Swipe Extensions */
.refresh-indicator { position: absolute; top: 50px; left: 0; width: 100%; text-align: center; color: var(--tab-color); font-size: 12px; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
.article-view { position: fixed; top: 0; left: 100%; width: 100vw; height: 100vh; background: var(--bg-color); z-index: 100; transition: left 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; overflow: hidden; }
.article-view.open { left: 0; }
.av-header { padding: 10px 15px; background: var(--header-bg); border-bottom: 1px solid var(--card-active); display: flex; align-items: center; min-height: 40px; }
.btn-back { background: none; border: none; color: var(--border-color); font-size: 16px; padding: 5px 10px; cursor: pointer; margin-left: -5px; }
.av-body { flex: 1; overflow-y: auto; padding: 20px 15px; font-size: 16px; line-height: 1.7; -webkit-overflow-scrolling: touch; }
.av-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; line-height: 1.4; }
.av-date { font-size: 12px; color: var(--date-color); margin-bottom: 25px; }
.av-content { white-space: pre-wrap; margin-bottom: 30px; }
.av-external { display: block; padding: 12px 15px; background: var(--card-bg); color: var(--text-color); text-decoration: none; border-radius: 8px; font-size: 14px; text-align: center; margin-bottom: 30px; }
</style>
</head>
<body>
<div class="refresh-indicator" id="refresh-indicator">↓ 更新するには下に引く...</div>
<header>
  <nav id="tabs">
    <div class="tab active" data-filter="yahoo">Yahoo!</div>
    <div class="tab" data-filter="togetter">Togetter</div>
    <div class="tab" data-filter="gigazine">GIGAZINE</div>
  </nav>
</header>
<div class="container" id="container">
  <div style="text-align:center;color:var(--tab-color);padding-top:20px;">Loading...</div>
</div>

<!-- Dedicated Article View -->
<div class="article-view" id="article-view">
  <div class="av-header">
    <button class="btn-back" id="btn-back">← 戻る</button>
  </div>
  <div class="av-body">
    <div class="av-title" id="av-title"></div>
    <div class="av-date" id="av-date"></div>
    <div class="av-content" id="av-content"></div>
    <a href="#" class="av-external" id="av-external" target="_blank" rel="noopener">🌐 オリジナル記事を読む</a>
  </div>
</div><script>
const LABELS = { 'top':'総合', 'eco':'経済', 'it':'IT', 'int':'国際', 'dom':'国内', 'ent':'エンタメ', 'spo':'スポーツ', 'sci':'科学', 'loc':'地域', 'tgt':'X', 'ggz':'GIGA' };
const TABS = document.querySelectorAll('.tab');
const CONTAINER = document.getElementById('container');

// Fast date formatter (e.g. "Mon, 31 Mar 2026 10:00:00 GMT" -> "03/31 19:00")
function formatDate(dStr) {
  if(!dStr) return '';
  const d = new Date(dStr);
  if(isNaN(d)) return dStr;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

let currentData = [];
let readUrls = new Set(JSON.parse(localStorage.getItem('small_news_read') || '[]'));
let currentFilter = 'yahoo';

function markAsRead(url) {
  if(!readUrls.has(url)) {
    readUrls.add(url);
    const arr = Array.from(readUrls).slice(-200); 
    readUrls = new Set(arr);
    localStorage.setItem('small_news_read', JSON.stringify(arr));
  }
}

function renderData() {
  const list = currentData || [];
  let html = '';
  list.forEach((item, i) => {
    // 過去のデータなどsiteがない場合はフォールバックとしてcatをもとにsiteを推定
    const itmSite = item.site || (item.cat === 'tgt' ? 'togetter' : (item.cat === 'ggz' ? 'gigazine' : 'yahoo'));
    if(currentFilter !== 'all' && itmSite !== currentFilter) return;
    const isRead = readUrls.has(item.l) ? ' read' : '';
    const timeDisp = item.time ? item.time : formatDate(item.d);
    const pvDisp = item.pv ? `<span class="pv">👀 ${item.pv} pv</span>` : '';
    html += `<div class="article${isRead}" data-index="${i}">
        <div class="title">${item.t}</div>
        <div class="meta">
            <span class="tag tag-${item.cat}">${LABELS[item.cat]}</span>
            <div>
                ${pvDisp}
                <span class="date">${timeDisp}</span>
            </div>
        </div>
    </div>`;
  });
  if(html === '') html = '<div style="text-align:center;color:var(--tab-color);padding-top:20px;">No Data</div>';
  CONTAINER.innerHTML = html;
}

async function loadNews() {
  try {
    const res = await fetch(`data/news.json?_t=${Date.now()}`); 
    if(res.ok) {
      let data = await res.json();
      if (!Array.isArray(data)) {
        // Fallback for old cached dict format {top:[], eco:[], ...}
        let arr = [];
        for (let k in data) {
           arr.push(...data[k]);
        }
        data = arr.sort((a, b) => new Date(b.d) - new Date(a.d));
      }
      currentData = data;
      renderData();
    }
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

TABS.forEach(t => {
  t.addEventListener('click', () => {
    TABS.forEach(tab => tab.classList.remove('active'));
    t.classList.add('active');
    currentFilter = t.dataset.filter;
    renderData();
    CONTAINER.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// --- Article View Logic ---
const articleView = document.getElementById('article-view');
const btnBack = document.getElementById('btn-back');
const avTitle = document.getElementById('av-title');
const avDate = document.getElementById('av-date');
const avContent = document.getElementById('av-content');
const avExt = document.getElementById('av-external');

CONTAINER.addEventListener('click', (e) => {
  const artDiv = e.target.closest('.article');
  if(artDiv) {
      const i = parseInt(artDiv.dataset.index);
      if(!currentData[i]) return;
      const item = currentData[i];
      avTitle.textContent = item.t;
      avDate.textContent = formatDate(item.d);
      avContent.textContent = item.c || "(本文が見つかりませんでした)";
      avExt.href = item.l;
      articleView.classList.add('open');
      
      // 既読マークをつける
      markAsRead(item.l);
      artDiv.classList.add('read');
  }
});

btnBack.addEventListener('click', () => {
  articleView.classList.remove('open');
});

// --- Swipe-to-back Logic ---
let avTouchStartX = 0;
let avTouchStartY = 0;
articleView.addEventListener('touchstart', e => {
  if(e.touches.length === 1) {
    avTouchStartX = e.touches[0].clientX;
    avTouchStartY = e.touches[0].clientY;
  }
}, {passive: true});

articleView.addEventListener('touchend', e => {
  if(e.changedTouches.length === 1) {
    const dx = e.changedTouches[0].clientX - avTouchStartX;
    const dy = e.changedTouches[0].clientY - avTouchStartY;
    // Activate switch only if swiped from the left edge (< 40px)
    if(dx > 60 && Math.abs(dx) > Math.abs(dy) * 2 && avTouchStartX < 40) {
        articleView.classList.remove('open');
    }
  }
});

// --- Pull-to-refresh Logic ---
const refreshInd = document.getElementById('refresh-indicator');
let ptrStartY = 0;
let isPulling = false;

CONTAINER.addEventListener('touchstart', e => {
  if(CONTAINER.scrollTop <= 0) {
      isPulling = true;
      ptrStartY = e.touches[0].clientY;
  }
}, {passive: true});

CONTAINER.addEventListener('touchmove', e => {
  if(!isPulling) return;
  const dy = e.touches[0].clientY - ptrStartY;
  if(dy > 0) {
      refreshInd.style.opacity = Math.min(dy / 80, 1);
      if(dy > 80) refreshInd.textContent = "↻ 指を離して更新";
      else refreshInd.textContent = "↓ 更新するには下に引く...";
  }
}, {passive: true});

CONTAINER.addEventListener('touchend', e => {
  if(!isPulling) return;
  isPulling = false;
  const dy = e.changedTouches[0].clientY - ptrStartY;
  if(dy > 80) {
      refreshInd.textContent = "更新中...";
      loadNews().then(() => {
          refreshInd.style.opacity = 0;
      });
  } else {
      refreshInd.style.opacity = 0;
  }
});

// --- Swipe-to-switch-tabs Logic ---
let tabTouchStartX = 0;
let tabTouchStartY = 0;
CONTAINER.addEventListener('touchstart', e => {
  if(e.touches.length === 1) {
    tabTouchStartX = e.touches[0].clientX;
    tabTouchStartY = e.touches[0].clientY;
  }
}, {passive: true});

CONTAINER.addEventListener('touchend', e => {
  if(e.changedTouches.length === 1) {
    const dx = e.changedTouches[0].clientX - tabTouchStartX;
    const dy = e.changedTouches[0].clientY - tabTouchStartY;
    // Horizontal swipe trigger (dx > 50, and dominant over dy)
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2) {
      const tabsArr = Array.from(TABS);
      const activeIdx = tabsArr.findIndex(t => t.classList.contains('active'));
      let nextIdx = activeIdx;
      if(dx > 0) {
          // Swipe right -> go to previous tab
          nextIdx = activeIdx > 0 ? activeIdx - 1 : 0;
      } else {
          // Swipe left -> go to next tab
          nextIdx = activeIdx < tabsArr.length - 1 ? activeIdx + 1 : tabsArr.length - 1;
      }
      if(nextIdx !== activeIdx) {
          tabsArr[nextIdx].click(); // Trigger the existing click listener
      }
    }
  }
});

loadNews();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=5').then(reg => {
    reg.onupdatefound = () => {
      const installingWorker = reg.installing;
      if (installingWorker) {
        installingWorker.onstatechange = () => {
          if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('New version available. Refresh to update.');
          }
        };
      }
    };
  });
}
</script>
</body>
</html>
