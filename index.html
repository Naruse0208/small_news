<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>small news</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<style>
body { margin: 0; padding: 0; background: #121212; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; overscroll-behavior-y: none; }
header { padding: 10px 0; background: rgba(30, 30, 30, 0.95); position: sticky; top: 0; z-index: 10; display: flex; justify-content: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
nav { display: flex; gap: 20px; }
.tab { color: #888; text-decoration: none; font-size: 16px; font-weight: bold; padding: 5px 10px; cursor: pointer; transition: color 0.3s; user-select: none; }
.tab.active { color: #fff; border-bottom: 2px solid #0a84ff; }
.container { display: flex; width: 100vw; height: calc(100vh - 50px); overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
.container::-webkit-scrollbar { display: none; }
.page { flex: 0 0 100vw; height: 100%; scroll-snap-align: start; overflow-y: auto; padding: 10px 15px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
.page::-webkit-scrollbar { display: none; }
.article { display: block; padding: 15px; margin-bottom: 12px; background: #1e1e1e; border-radius: 8px; text-decoration: none; color: inherit; transition: background 0.2s, transform 0.1s; }
.article:active { background: #333; transform: scale(0.98); }
.title { font-size: 16px; line-height: 1.4; font-weight: 500; margin-bottom: 6px; }
.date { font-size: 12px; color: #888; }
</style>
</head>
<body>
<header>
  <nav id="tabs">
    <div class="tab active" data-target="0">総合</div>
    <div class="tab" data-target="1">経済</div>
    <div class="tab" data-target="2">IT</div>
    <div class="tab" data-target="3">国際</div>
  </nav>
</header>
<div class="container" id="container">
  <div class="page" id="page-top"><div style="text-align:center;color:#888;padding-top:20px;">Loading...</div></div>
  <div class="page" id="page-eco"><div style="text-align:center;color:#888;padding-top:20px;">Loading...</div></div>
  <div class="page" id="page-it"><div style="text-align:center;color:#888;padding-top:20px;">Loading...</div></div>
  <div class="page" id="page-int"><div style="text-align:center;color:#888;padding-top:20px;">Loading...</div></div>
</div>

<script>
const KEYS = ['top', 'eco', 'it', 'int'];
const PAGES = KEYS.map(k => document.getElementById(`page-${k}`));
const TABS = document.querySelectorAll('.tab');
const CONTAINER = document.getElementById('container');

// Fast date formatter (e.g. "Mon, 31 Mar 2026 10:00:00 GMT" -> "03/31 19:00")
function formatDate(dStr) {
  if(!dStr) return '';
  const d = new Date(dStr);
  if(isNaN(d)) return dStr;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function renderData(data) {
  KEYS.forEach((key, idx) => {
    const list = data[key] || [];
    let html = '';
    list.forEach(item => {
      html += `<a href="${item.l}" class="article" target="_blank" rel="noopener"><div class="title">${item.t}</div><div class="date">${formatDate(item.d)}</div></a>`;
    });
    if(html === '') html = '<div style="text-align:center;color:#888;padding-top:20px;">No Data</div>';
    PAGES[idx].innerHTML = html;
  });
}

async function loadNews() {
  try {
    const res = await fetch(`data/news.json?_t=${Date.now()}`); // Cache busting param
    if(res.ok) {
      const data = await res.json();
      renderData(data);
    }
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

TABS.forEach(t => {
  t.addEventListener('click', () => {
    const idx = parseInt(t.dataset.target);
    CONTAINER.scrollTo({ left: window.innerWidth * idx, behavior: 'smooth' });
  });
});

let scrollTimeout;
CONTAINER.addEventListener('scroll', () => {
    if(scrollTimeout) cancelAnimationFrame(scrollTimeout);
    scrollTimeout = requestAnimationFrame(() => {
        const scrollLeft = CONTAINER.scrollLeft;
        const width = window.innerWidth || CONTAINER.clientWidth;
        const idx = Math.round(scrollLeft / width);
        TABS.forEach((t, i) => {
            if (i === idx) t.classList.add('active');
            else t.classList.remove('active');
        });
    });
}, { passive: true });

loadNews();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
